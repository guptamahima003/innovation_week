services:
  - type: web
    name: persona-engine-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NUM_CUSTOMERS
        value: "2000"
      - key: PYTHON_VERSION
        value: "3.11.0"
